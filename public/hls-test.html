<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HLS Test</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#111;color:#fff">
<h2>HLS 支持检测</h2>
<div id="result" style="font-size:18px;line-height:2"></div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const r = document.getElementById('result');
const v = document.createElement('video');
const hlsSupported = (typeof Hls !== 'undefined') && Hls.isSupported();
const nativeHls = v.canPlayType('application/vnd.apple.mpegurl');
const nativeHls2 = v.canPlayType('application/x-mpegURL');
const mseSupported = !!(window.MediaSource || window.WebKitMediaSource);

r.innerHTML = [
  '✅ Hls.isSupported(): <b>' + hlsSupported + '</b>',
  '📺 canPlayType(mpegurl): <b>"' + nativeHls + '"</b>',
  '📺 canPlayType(x-mpegURL): <b>"' + nativeHls2 + '"</b>',
  '🔧 MediaSource API: <b>' + mseSupported + '</b>',
  '🌐 UserAgent: <b style="font-size:12px">' + navigator.userAgent + '</b>',
].join('<br>');
</script>
</body>
</html>
